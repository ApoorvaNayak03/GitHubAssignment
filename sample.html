<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty Website</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            text-align: center;
            color: white;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            font-size: 3rem;
            margin: 10px 0;
        }
        p {
            font-size: 1.5rem;
            max-width: 600px;
            line-height: 1.5;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: white;
            color: #ff7e5f;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }
        .button:hover {
            background: #ff7e5f;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to this  Website</h1>
        <p>This is a modern, elegant webpage with a smooth gradient background.</p>
        <a href="#" class="button">Learn More</a>
    </div>
</body>
</html>
